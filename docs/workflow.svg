<svg width="840" height="420" viewBox="0 0 840 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="840" height="420" rx="16" fill="#111111"/>
  
  <!-- Styles & Animations -->
  <style>
    @font-face { font-family: 'Inter'; font-style: normal; }
    @keyframes flow { 0% { stroke-dashoffset: 24; } 100% { stroke-dashoffset: 0; } }
    @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    .node-text { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 15px; fill: #FFFFFF; }
    .label-text { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #888888; text-transform: uppercase; letter-spacing: 0.08em; }
    .connector { stroke: #10A37F; stroke-width: 2.5; stroke-dasharray: 6 6; animation: flow 1.5s linear infinite; opacity: 0.6; }
    .node-box { fill: #1A1A1A; stroke: #333333; stroke-width: 1.5; rx: 12; transition: all 0.3s; }
    .highlight-box { fill: rgba(16, 163, 127, 0.08); stroke: #10A37F; stroke-width: 2; }
    .credit-text { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; fill: #555555; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
  </style>

  <!-- Definition for Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10A37F" />
    </marker>
  </defs>

  <!-- 1. DATA INPUT -->
  <g transform="translate(40, 160)">
    <rect class="node-box" width="140" height="90" />
    <text x="70" y="45" text-anchor="middle" class="node-text">Documents</text>
    <text x="70" y="65" text-anchor="middle" class="label-text">PDF · TXT · DOCX</text>
  </g>

  <!-- 2. EMBEDDING ENGINE -->
  <g transform="translate(240, 160)">
    <rect class="node-box" width="140" height="90" />
    <text x="70" y="45" text-anchor="middle" class="node-text">Embeddings</text>
    <text x="70" y="65" text-anchor="middle" class="label-text">all-MiniLM-L6</text>
  </g>

  <!-- 3. VECTOR DATABASE (Top Path) -->
  <g transform="translate(440, 80)">
    <rect class="node-box highlight-box" width="160" height="100" />
    <text x="80" y="45" text-anchor="middle" class="node-text" style="fill:#10A37F">ENDEE DB</text>
    <text x="80" y="70" text-anchor="middle" class="label-text" style="fill:#10A37F; font-weight:700">Native Vector DB</text>
    <circle cx="80" cy="15" r="4" fill="#10A37F" class="pulse" />
  </g>

  <!-- 4. LLM INFERENCE (Bottom Path) -->
  <g transform="translate(440, 240)">
    <rect class="node-box" width="160" height="100" />
    <text x="80" y="45" text-anchor="middle" class="node-text">Ollama LLM</text>
    <text x="80" y="70" text-anchor="middle" class="label-text">Llama3 / Gemma2</text>
  </g>

  <!-- 5. FINAL OUTPUT -->
  <g transform="translate(680, 170)">
    <rect class="node-box highlight-box" width="120" height="70" style="rx:35" />
    <text x="60" y="40" text-anchor="middle" class="node-text">Answer</text>
    <text x="60" y="85" text-anchor="middle" class="label-text">RAG Response</text>
  </g>

  <!-- CONNECTORS (Aligned) -->
  
  <!-- Doc -> Embeddings -->
  <path d="M180 205 H240" class="connector" />
  
  <!-- Embeddings -> Endee (Curved) -->
  <path d="M380 205 C410 205 410 130 440 130" class="connector" fill="none" />
  
  <!-- Embeddings -> LLM (Curved) -->
  <path d="M380 205 C410 205 410 290 440 290" class="connector" fill="none" style="stroke:#555555; animation:none; opacity:0.3" />

  <!-- Endee -> Answer (Curved) -->
  <path d="M600 130 C630 130 630 205 680 205" class="connector" fill="none" />
  
  <!-- LLM -> Answer (Curved) -->
  <path d="M600 290 C630 290 630 205 680 205" class="connector" fill="none" style="animation-delay: 0.75s" />

  <!-- CREDITS -->
  <text x="810" y="400" text-anchor="end" class="credit-text">System Architected by Sowmiyan S</text>

</svg>
