<svg width="840" height="520" viewBox="0 0 840 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    GuadRAG System Architecture - Balanced and Robust 
    Aesthetic: Obsidian Glassmorphism
  -->
  
  <defs>
    <!-- Glow Effects -->
    <filter id="f_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Card Gradients -->
    <linearGradient id="g_blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.2" />
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="g_purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.2" />
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="g_orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.2" />
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="g_emerald" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981" stop-opacity="0.2" />
      <stop offset="1" stop-color="#10b981" stop-opacity="0.05" />
    </linearGradient>

    <!-- Path Pulse -->
    <linearGradient id="g_pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0" />
      <stop offset="0.5" stop-color="#3b82f6" stop-opacity="1" />
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0" />
    </linearGradient>
  </defs>

  <style>
    .t-main { font-family: sans-serif; fill: #ffffff; font-weight: 800; font-size: 28px; }
    .t-sub { font-family: sans-serif; fill: #6366f1; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.15em; }
    .n-title { font-family: sans-serif; fill: #ffffff; font-size: 16px; font-weight: 700; }
    .n-desc { font-family: sans-serif; fill: #94a3b8; font-size: 11px; }
    .l-phase { font-family: sans-serif; fill: #475569; font-size: 10px; font-weight: bold; text-transform: uppercase; }
    
    /* Animation - Using separate classes to avoid transform conflicts */
    .anim-float { animation: floatFrame 5s ease-in-out infinite; }
    @keyframes floatFrame {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    
    .path-pulse {
      stroke: url(#g_pulse);
      stroke-width: 2.5;
      stroke-dasharray: 100 300;
      animation: pulseMove 4s linear infinite;
    }
    @keyframes pulseMove {
      from { stroke-dashoffset: 400; }
      to { stroke-dashoffset: 0; }
    }
  </style>

  <!-- Canvas -->
  <rect width="840" height="520" rx="24" fill="#020617"/>
  <rect width="840" height="520" rx="24" stroke="#1e293b" stroke-width="1" fill="none" opacity="0.5"/>
  
  <!-- Header -->
  <text x="50" y="60" class="t-main">GuadRAG Engine</text>
  <text x="50" y="85" class="t-sub">Production Retrieval Workflow</text>

  <!-- Frames -->
  <rect x="40" y="110" width="760" height="150" rx="16" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.05" />
  <text x="60" y="132" class="l-phase">Knowledge Ingestion</text>

  <rect x="40" y="285" width="760" height="195" rx="16" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.05" />
  <text x="60" y="307" class="l-phase">Live Retrieval &amp; Generation</text>

  <!-- Connectors -->
  <g opacity="0.4">
    <path d="M180 185 H240" stroke="#334155" />
    <path d="M380 185 H440" stroke="#334155" />
    <path d="M180 385 H240" stroke="#334155" />
    <path d="M380 385 H440" stroke="#334155" />
    <path d="M590 185 C640 185 640 385 590 385" stroke="#334155" fill="none" />
    <path d="M590 405 H670" stroke="#334155" />
  </g>

  <!-- Animated Pulses (Overlay) -->
  <path d="M180 185 H240" class="path-pulse" fill="none" />
  <path d="M380 185 H440" class="path-pulse" fill="none" style="animation-delay: 1s" />
  <path d="M180 385 H240" class="path-pulse" fill="none" style="animation-delay: 0.5s" />
  <path d="M380 385 H440" class="path-pulse" fill="none" style="animation-delay: 1.5s" />

  <!-- Nodes -->
  
  <!-- 1. Documents -->
  <g transform="translate(60, 145)">
    <g class="anim-float">
      <rect width="120" height="80" rx="12" fill="url(#g_blue)" stroke="#3b82f6" stroke-opacity="0.4" />
      <text x="60" y="35" text-anchor="middle" class="n-title">Sources</text>
      <text x="60" y="55" text-anchor="middle" class="n-desc">PDF/TXT Docs</text>
    </g>
  </g>

  <!-- 2. Embeddings -->
  <g transform="translate(240, 145)">
    <g class="anim-float" style="animation-delay: 0.5s">
      <rect width="140" height="80" rx="12" fill="url(#g_purple)" stroke="#8b5cf6" stroke-opacity="0.4" />
      <text x="70" y="35" text-anchor="middle" class="n-title">Embedder</text>
      <text x="70" y="55" text-anchor="middle" class="n-desc">Semantic Vector</text>
    </g>
  </g>

  <!-- 3. Endee DB -->
  <g transform="translate(440, 145)">
    <g class="anim-float" style="animation-delay: 1s">
      <rect width="150" height="80" rx="12" fill="url(#g_orange)" stroke="#f59e0b" stroke-opacity="0.4" />
      <text x="75" y="35" text-anchor="middle" class="n-title">Endee DB</text>
      <text x="75" y="55" text-anchor="middle" class="n-desc">Fast Retrieval</text>
    </g>
  </g>

  <!-- 4. User Query -->
  <g transform="translate(60, 345)">
    <g class="anim-float" style="animation-delay: 0.2s">
      <rect width="120" height="80" rx="12" fill="url(#g_blue)" stroke="#3b82f6" stroke-opacity="0.4" />
      <text x="60" y="35" text-anchor="middle" class="n-title">Query</text>
      <text x="60" y="55" text-anchor="middle" class="n-desc">User Question</text>
    </g>
  </g>

  <!-- 5. Search -->
  <g transform="translate(240, 345)">
    <g class="anim-float" style="animation-delay: 0.7s">
      <rect width="140" height="80" rx="12" fill="url(#g_purple)" stroke="#8b5cf6" stroke-opacity="0.4" />
      <text x="70" y="35" text-anchor="middle" class="n-title">Search</text>
      <text x="70" y="55" text-anchor="middle" class="n-desc">Vector Lookup</text>
    </g>
  </g>

  <!-- 6. LLM -->
  <g transform="translate(440, 345)">
    <g class="anim-float" style="animation-delay: 1.2s">
      <rect width="150" height="100" rx="12" fill="#1e293b" stroke="#6366f1" stroke-opacity="0.5" />
      <text x="75" y="35" text-anchor="middle" class="n-title">Reasoner</text>
      <text x="75" y="55" text-anchor="middle" class="n-desc">LLM Synthesis</text>
      <path d="M30 70 h90" stroke="#ffffff" stroke-opacity="0.1" />
      <text x="75" y="85" text-anchor="middle" class="n-desc" style="fill:#6366f1;font-weight:bold">Ollama / API</text>
    </g>
  </g>

  <!-- 7. Response -->
  <g transform="translate(670, 355)">
    <g class="anim-float" style="animation-delay: 1.5s">
      <rect width="110" height="80" rx="12" fill="url(#g_emerald)" stroke="#10b981" stroke-opacity="0.4" />
      <text x="55" y="35" text-anchor="middle" class="n-title">Answer</text>
      <text x="55" y="55" text-anchor="middle" class="n-desc">Verified RAG</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="790" y="500" text-anchor="end" font-family="sans-serif" fill="#334155" font-size="10px">Pipeline Architecture &#183; v2.1</text>
</svg>
